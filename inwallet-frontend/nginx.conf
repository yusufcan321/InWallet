server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # AI isteklerini ai-assistant-service'e yönlendir (daha spesifik blok önce gelir)
    location /api/ai {
        proxy_pass http://inwallet-ai:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API isteklerini portfolio-service'e yönlendir
    location /api/ {
        proxy_pass http://inwallet-portfolio:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
