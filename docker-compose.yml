services:

  # =============================================
  # ALTYAPI SERVİSLERİ
  # =============================================
  postgres:
    image: postgres:15-alpine
    container_name: inwallet-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wallet_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inwallet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wallet_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inwallet-redis
    ports:
      - "6379:6379"
    networks:
      - inwallet-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: inwallet-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - inwallet-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: inwallet-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - inwallet-network

  # =============================================
  # UYGULAMA SERVİSLERİ
  # =============================================
  portfolio-service:
    build:
      context: ./portfolio-service
      dockerfile: Dockerfile
    container_name: inwallet-portfolio
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - inwallet-network

  ai-assistant-service:
    build:
      context: ./ai-assistant-service
      dockerfile: Dockerfile
    container_name: inwallet-ai
    ports:
      - "8081:8081"
    environment:
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8080
    depends_on:
      - portfolio-service
    networks:
      - inwallet-network

  inwallet-frontend:
    build:
      context: ./inwallet-frontend
      dockerfile: Dockerfile
    container_name: inwallet-frontend
    ports:
      - "5173:80"
    depends_on:
      - portfolio-service
      - ai-assistant-service
    networks:
      - inwallet-network

volumes:
  postgres_data:

networks:
  inwallet-network:
    driver: bridge
